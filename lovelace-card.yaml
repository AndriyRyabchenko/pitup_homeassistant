# PitUp — картка для дашборда (Markdown, нативна).
# Рекомендований формат: без «Custom element not found» на холодному кеші.
# Додай: дашборд → Додати картку → Ручна (Manual) → встав цей YAML.
type: markdown
title: PitUp — техніка
content: |
  {%- set vs = state_attr('sensor.pitup','vehicles') or [] -%}
  {%- set t = state_attr('sensor.pitup','totals') or {} -%}
  {%- set ns = namespace(rows=[]) -%}
  {%- for v in vs -%}
    {%- set dot = '🔴' if v.status == 'overdue' else ('🟡' if v.status == 'soon' else '🟢') -%}
    {%- set veh = '**' ~ v.title ~ '**<br>`' ~ v.mileage ~ ' ' ~ v.unit ~ '`' ~ (' ≈' if v.mileage_estimated else '') -%}
    {%- if v.policy -%}
      {%- set pnote = 'прострочено' if v.policy.status == 'overdue' else ('спливає, ' ~ v.policy.days_left ~ ' дн') -%}
      {%- set veh = veh ~ '<br>🛡️ ' ~ v.policy.kind ~ ' — ' ~ pnote -%}
    {%- endif -%}
    {%- if v.next -%}
      {%- if v.next.status == 'overdue' -%}
        {%- set nx = v.next.name ~ '<br>⚠️ прострочено' ~ (' +' ~ v.next.over_km ~ ' ' ~ v.unit if v.next.over_km else '') -%}
      {%- else -%}
        {%- set parts = [] -%}
        {%- if v.next.due_km is not none -%}{%- set parts = parts + ['через ' ~ v.next.due_km ~ ' ' ~ v.unit] -%}{%- endif -%}
        {%- if v.next.next_date -%}{%- set parts = parts + [v.next.next_date] -%}{%- endif -%}
        {%- set nx = v.next.name ~ '<br>' ~ (parts | join(' · ')) -%}
      {%- endif -%}
    {%- else -%}
      {%- set nx = '—' -%}
    {%- endif -%}
    {%- set ns.rows = ns.rows + ['| ' ~ dot ~ ' | ' ~ veh ~ ' | ' ~ nx ~ ' |'] -%}
  {%- endfor -%}
  {%- set psum = (t.policy_overdue or 0) + (t.policy_soon or 0) -%}
  {% if t.overdue or t.soon or psum %}{% if t.overdue %}🔴 **{{ t.overdue }}** протерміновано{% endif %}{% if t.soon %}{% if t.overdue %} &nbsp;·&nbsp; {% endif %}🟡 **{{ t.soon }}** скоро{% endif %}{% if psum %}{% if t.overdue or t.soon %} &nbsp;·&nbsp; {% endif %}🛡️ **{{ psum }}** страхов.{% endif %}
  {% endif %}
  |  | Техніка | Найближче ТО |
  |:--:|:--|:--|
  {{ ns.rows | join('\n') }}
